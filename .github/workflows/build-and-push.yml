name: Build and Push Docker Image

# The Trigger: Run this workflow every time code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # Use a clean, temporary Ubuntu Linux machine provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository code onto the runner
      - name: Check out the repository code
        uses: actions/checkout@v4

      # Step 2: Log into Docker Hub using the secure secrets we just saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx (optimizes builds and enables caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build your Dockerfile and push the image to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Replace 'flask-docker-practice' with whatever you want your Docker Hub image to be named
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-docker-practice:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-docker-practice:${{ github.sha }}